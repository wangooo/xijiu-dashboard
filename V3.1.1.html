            // ===== 根据内置对照表补全上传数据的省份/城市列 =====
            function enrichWithBuiltinLookup(s2rows) {
                if (!s2rows || s2rows.length === 0) {
                    return { rows: s2rows || [], matched: 0, unmatched: 0 };
                }
                const hd = [...s2rows[0]];
                let ci = hd.findIndex(h => {
                    const s = String(h || '').trim().replace(/\s+/g, ' ');
                    return s === '商家门店编号' || s === '商家门店编码' || s === '门店编码' || s.includes('门店编号');
                });
                if (ci === -1) {
                    ci = hd.findIndex(h => String(h || '').includes('商家门店编号') || String(h || '').includes('门店编号'));
                }
                let pi = hd.findIndex(h => String(h || '').includes('省份'));
                let cyi = hd.findIndex(h => String(h || '').includes('城市'));
                if (pi === -1) { pi = hd.length; hd.push('省份'); }
                if (cyi === -1) { cyi = hd.length; hd.push('城市'); }
                const out = [hd];
                let mt = 0, um = 0;
                for (let r = 1; r < s2rows.length; r++) {
                    const ro = [...(s2rows[r] || [])];
                    while (ro.length < hd.length) ro.push('');
                    const code = (ci > -1 && ro[ci] != null) ? String(ro[ci]).trim() : '';
                    if (code && STORE_LOCATION_MAP.has(code)) {
                        const v = STORE_LOCATION_MAP.get(code);
                        ro[pi] = v.province || '?';
                        ro[cyi] = v.city || '?';
                        mt++;
                    } else {
                        ro[pi] = '?';
                        ro[cyi] = '?';
                        um++;
                    }
                    out.push(ro);
                }
                return { rows: out, matched: mt, unmatched: um };
            }

            document.getElementById('excelInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                document.getElementById('fileInfo').innerHTML = `<i class="fas fa-spinner fa-pulse"></i> 解析中...`;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                       const data = new Uint8Array(ev.target.result);
                       const workbook = XLSX.read(data, { type: 'array' });

                       const names = workbook.SheetNames;
                        const s2 = names.find(n => /[Ss]heet2/i.test(n)) || names[0];
                        const r2 = XLSX.utils.sheet_to_json(workbook.Sheets[s2], { header: 1, defval: '' });
                        const enriched = enrichWithBuiltinLookup(r2);
                        let rows = enriched.rows, matchMsg = `门店对照匹配: 成功 ${enriched.matched} 行 / 失败 ${enriched.unmatched} 行（已填?）`;

                        if (!rows || rows.length < 2) {
                            resetFadeOutState();
                            alert("无数据");
                            return;
                        }
                        const { orders, colIdx } = parseOrders(rows);
                        if (!colIdx || orders.length === 0) {
                            resetFadeOutState();
                            alert("未找到必要列（渠道/订单状态/商品总金额）或数据为空");
                            return;
                        }
                        // 重置淡出状态，使提示文字重新出现，随后会在 renderDashboard 中再次淡出
                       resetFadeOutState();
                       document.getElementById('fileInfo').innerHTML =
                            `<i class="fas fa-check-circle"></i> 已加载 ${orders.length} 笔订单` +
                            (matchMsg ? `<br><span style="font-size:0.75rem;color:#f97316;">${matchMsg}</span>` : '');
                        setTimeout(() => renderDashboard(orders), 30);
                    } catch (err) {
                        console.error(err);
                        resetFadeOutState();
                        alert("解析失败：" + err.message);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
            document.getElementById('downloadTemplateBtn').addEventListener('click', downloadTemplate);
            document.getElementById('resetDataBtn').addEventListener('click', resetAll);
            document.getElementById('exportReportBtn').addEventListener('click', exportReportViaPrint);
           document.getElementById('exportCleanDataBtn').addEventListener('click', exportCleanData);
            window.addEventListener('DOMContentLoaded', () => {
                const cached = loadCachedOrders();
                if (cached && cached.length && confirm("检测到上次缓存，是否恢复？")) {
                    renderDashboard(cached);
                    document.getElementById('fileInfo').innerHTML = `<i class="fas fa-database"></i> 从缓存恢复 ${cached.length} 单`;
                } else clearCache();
            });
        })();
