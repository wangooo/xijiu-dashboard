<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>全渠道订单自助分析看板</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #f4f7fc;
            padding: 2rem 1.5rem;
            color: #1e2a3e;
        }
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }
        .upload-area {
            background: white;
            border-radius: 32px;
            padding: 2rem 1.5rem;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 12px 28px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid #eef2f8;
            transition: padding 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .upload-area i {
            font-size: 48px;
            color: #f97316;
            margin-bottom: 12px;
        }
        .upload-btn,
        .reset-btn,
        .export-btn,
        .template-btn,
        .export-clean-btn {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            margin: 8px 6px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .reset-btn {
            background: linear-gradient(135deg, #64748b, #475569);
        }
        .export-btn {
            background: linear-gradient(135deg, #0f766e, #0d9488);
        }
        .export-clean-btn {
            background: linear-gradient(135deg, #2c3e66, #1e3a5f);
        }
        .template-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        .file-info {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #4a6a7f;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), max-height 0.8s cubic-bezier(0.4, 0, 0.2, 1), margin 0.8s cubic-bezier(0.4, 0, 0.2, 1), padding 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            max-height: 60px;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .kpi-card {
            background: white;
            border-radius: 28px;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f3f8;
        }
        .kpi-icon {
            width: 54px;
            height: 54px;
            background: #fff3eb;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f97316;
            font-size: 28px;
            flex-shrink: 0;
        }
        .kpi-content h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #5b6e8c;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .kpi-main {
            font-size: 2rem;
            font-weight: 700;
            color: #1e2a3e;
            line-height: 1.2;
        }
        .row-2col {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.8rem;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 1.4rem 1.2rem 1.6rem;
            box-shadow: 0 12px 28px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid #edf2f7;
            break-inside: avoid;
            overflow: hidden;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            font-weight: 700;
            font-size: 1.2rem;
            color: #1e466e;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 0.7rem;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .card-header-left i {
            color: #f97316;
            background: #fff4ed;
            padding: 8px;
            border-radius: 14px;
        }
        .province-selector,
        .city-selector {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            min-width: 140px;
        }
        .province-selector:hover,
        .city-selector:hover {
            border-color: #f97316;
            background: #fff7ed;
        }
        .province-search-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.8rem;
            width: 140px;
            outline: none;
        }
        .province-search-input:focus {
            border-color: #f97316;
            background: #fff7ed;
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .table-mini {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .table-mini th {
            text-align: left;
            background: #f8fafc;
            padding: 0.7rem 0.5rem;
            font-weight: 600;
            color: #2c5a6e;
        }
        .table-mini td {
            padding: 0.6rem 0.5rem;
            border-bottom: 1px solid #e9eef2;
        }
        .badge {
            background: #eef2fa;
            color: #2c6e9e;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .badge.success {
            background: #e0f5e9;
            color: #1e6f4c;
        }
        .badge.danger {
            background: #ffe6e5;
            color: #b33a34;
        }
        .badge.warning {
            background: #fff1e0;
            color: #bc6f00;
        }
        .channel-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .amount-card {
            background: #f9fdfb;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #e2f0ea;
        }
        .insight-box {
            background: #f3faf7;
            border-radius: 24px;
            padding: 1.2rem 1.8rem;
            margin-top: 1.8rem;
            border-left: 6px solid #f97316;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #1a4f62;
        }
        .footer-note {
            text-align: right;
            font-size: 0.75rem;
            color: #7c9aa8;
            margin-top: 2rem;
            border-top: 1px dashed #cbdcdb;
            padding-top: 1rem;
        }
        @media (max-width: 800px) {
            .row-2col {
                grid-template-columns: 1fr;
            }
            .amount-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 1rem;
            }
        }
        .hidden {
            display: none;
        }
        .pie-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .pie-chart-box {
            width: 100%;
            max-width: 200px;
            margin: 0 auto;
            aspect-ratio: 1/1;
        }
        .pie-note {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
        }
        .pie-label-badge {
            background: #f0f2f5;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .city-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .city-bar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .city-name {
            width: 85px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }
        .bar-bg {
            flex: 1;
            background: #e9eef2;
            border-radius: 20px;
            height: 28px;
            overflow: hidden;
            min-width: 40px;
        }
        .bar-fill {
            background: linear-gradient(90deg, #f97316, #fdba74);
            width: 0%;
            height: 100%;
            border-radius: 20px;
            /* 移除内部文本，只保留背景 */
        }
        .city-count {
            width: 120px;
            text-align: right;
            font-weight: 600;
            color: #1e293b;
            flex-shrink: 0;
            font-size: 0.8rem;
        }
        .health-overview {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .health-stat {
            flex: 1;
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            border: 1px solid #e2e8f0;
            min-width: 100px;
        }
        .health-number {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 8px 0 4px;
        }
        .progress-bar-bg {
            background: #e2e8f0;
            border-radius: 12px;
            height: 8px;
            margin: 8px 0;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: #f97316;
            width: 0%;
            height: 100%;
            border-radius: 12px;
        }
        .fail-store-list {
            margin-top: 16px;
            border-top: 1px solid #e2e8f0;
            padding-top: 12px;
        }
        .store-tag {
            background: #fee2e2;
            color: #b91c1c;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            display: inline-block;
            margin: 4px 6px 4px 0;
        }
        .dist-flex {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .dist-avg-card {
            flex: 1;
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            color: white;
            border-radius: 24px;
            padding: 16px;
            text-align: center;
            min-width: 160px;
        }
        .dist-avg-number {
            font-size: 2.2rem;
            font-weight: 800;
        }
        .dist-channels {
            flex: 2;
            background: #f8fafc;
            border-radius: 24px;
            padding: 12px 16px;
            min-width: 200px;
        }
        .dist-bar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }
        .dist-bar-bg {
            flex: 1;
            background: #e2e8f0;
            border-radius: 12px;
            height: 20px;
            overflow: hidden;
        }
        .dist-bar-fill {
            background: #0f766e;
            width: 0%;
            height: 100%;
            border-radius: 12px;
        }
        .farthest-cities {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #cbd5e1;
        }
        .wow-stats {
            display: flex;
            justify-content: space-around;
            text-align: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .wow-stat-item {
            flex: 1;
            min-width: 120px;
        }
        .wow-label {
            font-size: 0.85rem;
            color: #5b6e8c;
        }
        .wow-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e2a3e;
        }
        .wow-change {
            font-size: 0.85rem;
        }
        .wow-previous {
            font-size: 0.7rem;
            color: #7c8ba0;
        }
        .date-range-note {
            margin-top: 12px;
            font-size: 0.7rem;
            color: #7c9aa8;
            text-align: center;
        }
        .wow-date-picker {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 8px 16px;
            border-radius: 40px;
            margin-bottom: 16px;
        }
        .wow-date-picker label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #334155;
        }
        .wow-date-picker input {
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.8rem;
            background: white;
        }
        .wow-date-picker button {
            background: #f97316;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 600;
        }
        .wow-date-picker button.reset-wow {
            background: #64748b;
        }
        .wow-date-picker button.quick-btn {
            background: #3b82f6;
        }
        .store-search-box {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .store-search-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.8rem;
            width: 180px;
            outline: none;
        }
        .store-pagination {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .page-btn {
            background: #f1f5f9;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .page-btn.active {
            background: #f97316;
            color: white;
        }
        #error-console {
            background: #fff1f0;
            border-left: 4px solid #f97316;
            padding: 8px 12px;
            margin-bottom: 12px;
            font-size: 0.8rem;
            color: #b91c1c;
            display: none;
        }

        /* ----- 平滑消失：上传区提示文字及图标淡出 ----- */
        .fade-out-text {
            opacity: 0 !important;
            max-height: 0 !important;
            overflow: hidden !important;
            margin: 0 !important;
            padding: 0 !important;
            border: 0 !important;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                max-height 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                margin 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                padding 0.8s cubic-bezier(0.4, 0, 0.2, 1) !important;
            pointer-events: none !important;
        }

        .upload-area i.fa-cloud-upload-alt.fade-out-text {
            display: inline-block;
            max-height: 0 !important;
            width: 0 !important;
            font-size: 0 !important;
            overflow: hidden !important;
            margin: 0 !important;
            padding: 0 !important;
            opacity: 0 !important;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .upload-area h3,
        .upload-area>p {
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                max-height 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                margin 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                padding 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            max-height: 120px;
        }
        .upload-area h3.fade-out-text,
        .upload-area>p.fade-out-text {
            opacity: 0 !important;
            max-height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            border: 0 !important;
            pointer-events: none !important;
        }

        /* 移动端优化 */
        @media (max-width: 768px) {
            .action-bar {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
                gap: 12px;
            }
            .action-bar .upload-btn,
            .action-bar .reset-btn,
            .action-bar .export-btn,
            .action-bar .template-btn,
            .action-bar .export-clean-btn {
                margin: 0;
                width: 100%;
                justify-content: center;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }
            .kpi-card {
                padding: 0.8rem;
            }
            .kpi-main {
                font-size: 1.4rem;
            }
            .kpi-icon {
                width: 42px;
                height: 42px;
                font-size: 22px;
            }
            .card {
                padding: 1rem;
            }
            .card-header {
                font-size: 1rem;
            }
            .card-header-left i {
                padding: 6px;
                font-size: 1rem;
            }
            .province-selector,
            .city-selector,
            .province-search-input,
            .store-search-input {
                width: 100%;
                min-width: auto;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .city-bar-item {
                gap: 4px;
            }
            .city-name {
                width: 70px;
                font-size: 0.75rem;
            }
            .bar-fill {
                /* 无内部文本，无需调整 */
            }
            .city-count {
                width: 90px;
                font-size: 0.7rem;
            }
            .wow-date-picker {
                flex-direction: column;
                align-items: stretch;
            }
            .wow-date-picker input,
            .wow-date-picker button {
                width: 100%;
            }
            .wow-stats {
                gap: 0.5rem;
            }
            .wow-stat-item .wow-value {
                font-size: 1.2rem;
            }
            .pie-chart-box {
                max-width: 150px;
            }
            .dist-avg-card {
                min-width: auto;
                padding: 12px;
            }
            .dist-avg-number {
                font-size: 1.5rem;
            }
            .amount-grid {
                gap: 0.8rem;
            }
            .health-overview {
                gap: 8px;
            }
            .health-stat {
                padding: 8px;
            }
            .health-number {
                font-size: 1.3rem;
            }
            .table-mini {
                font-size: 0.75rem;
            }
            .table-mini th,
            .table-mini td {
                padding: 0.4rem 0.25rem;
            }
            #trendAnalysis,
            #hourlyPanel {
                min-height: 250px;
                height: auto;
            }
            .store-search-box {
                width: 100%;
            }
            .store-pagination {
                justify-content: center;
            }
            .dist-flex {
                flex-direction: column;
            }
            .dist-channels {
                min-width: auto;
            }
        }
        @media print {
            .upload-area,
            .action-bar,
            .reset-btn,
            .export-btn,
            .template-btn,
            .upload-btn,
            .file-info,
            .footer-note,
            #error-console {
                display: none !important;
            }
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-dialog {
            background: #fff;
            border-radius: 28px;
            padding: 1.8rem;
            max-width: 560px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 16px; right: 20px;
            font-size: 1.5rem;
            color: #94a3b8;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
        }
        .modal-close:hover { color: #475569; }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e466e;
            margin-bottom: 1.2rem;
            padding-bottom: 0.7rem;
            border-bottom: 2px solid #f1f5f9;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div id="error-console"></div>
        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>📂 上传订单Excel（全渠道，自动适配模板）</h3>
            <p style="margin: 8px 0; color: #5a6e7c;">支持 .xlsx/.xls，自动识别渠道/状态/金额/地址/时间/配送距离，分析城市、时段、配送</p>
            <div class="action-bar">
                <button class="template-btn" id="downloadTemplateBtn"><i class="fas fa-download"></i> 下载示例模板</button>
                <button class="upload-btn" onclick="document.getElementById('excelInput').click()"><i class="fas fa-chart-line"></i> 选择文件分析</button>
                <button class="reset-btn" id="resetDataBtn"><i class="fas fa-trash-alt"></i> 重置数据</button>
                <button class="export-btn" id="exportReportBtn"><i class="fas fa-file-pdf"></i> 导出报告(PDF)</button>
                <button class="export-clean-btn" id="exportCleanDataBtn"><i class="fas fa-database"></i> 导出清洗模板</button>
            </div>

    <script>
        (function() {
            window.addEventListener('error', function(e) {
                const errDiv = document.getElementById('error-console');
                if (errDiv) {
                    errDiv.style.display = 'block';
                    errDiv.innerHTML =
                        `<i class="fas fa-exclamation-triangle"></i> 运行时错误: ${e.message} (${e.filename}:${e.lineno})。请刷新页面重试。`;
                    console.error(e);
                }
            });

            let channelChart = null,
                trendChart = null,
                hourlyChart = null;
            let allOrders = [];
            let currentSelectedProvince = "全国";
            let currentSelectedStoreCity = "全国";
            let allProvinceList = [];
            let currentCityTopN = 10;
            let currentStorePage = 1;
            let currentStoreSearch = "";
            let currentStoreList = [];
            const storePageSize = 10;
            const colorPalette = ['#f97316', '#3b82f6', '#10b981', '#a855f7', '#f59e0b', '#ec489a', '#06b6d4', '#84cc16'];

            // ----- 淡出状态控制 -----
            let hasFadedOut = false;

            function resetFadeOutState() {
                hasFadedOut = false;
                const area = document.getElementById('uploadArea');
                if (!area) return;
                const h3 = area.querySelector('h3');
                const p = area.querySelector('p');
                const info = document.getElementById('fileInfo');
                const icon = area.querySelector('i.fa-cloud-upload-alt');
                if (h3) h3.classList.remove('fade-out-text');
                if (p) p.classList.remove('fade-out-text');
                if (info) info.classList.remove('fade-out-text');
                if (icon) icon.classList.remove('fade-out-text');
            }

            const cityToProvinceMap = {
                "成都": "四川省",
                "济南": "山东省",
                "青岛": "山东省",
                "重庆": "重庆市",
                "天津": "天津市",
                "福州": "福建省",
                "西安": "陕西省",
                "贵阳": "贵州省",
                "北京": "北京市",
                "上海": "上海市",
                "广州": "广东省",
                "深圳": "广东省",
                "武汉": "湖北省",
                "杭州": "浙江省",
                "南京": "江苏省",
                "郑州": "河南省",
                "长沙": "湖南省",
                "昆明": "云南省",
                "合肥": "安徽省",
                "南昌": "江西省",
                "沈阳": "辽宁省",
                "长春": "吉林省",
                "哈尔滨": "黑龙江省",
                "石家庄": "河北省",
                "太原": "山西省",
                "兰州": "甘肃省",
                "西宁": "青海省",
                "银川": "宁夏回族自治区",
                "乌鲁木齐": "新疆维吾尔自治区",
                "呼和浩特": "内蒙古自治区",
                "拉萨": "西藏自治区",
                "南宁": "广西壮族自治区",
                "海口": "海南省",
                "厦门": "福建省"
            };

            function normalizeProvinceName(province) {
                if (!province || province === "未知省份") return "未知省份";
                const special = ["北京市", "天津市", "上海市", "重庆市", "广西壮族自治区", "内蒙古自治区", "西藏自治区", "宁夏回族自治区",
                    "新疆维吾尔自治区"
                ];
                if (special.includes(province)) return province;
                if (province.endsWith("省") && province.length > 2) return province;
                const map = {
                    "北京": "北京市",
                    "天津": "天津市",
                    "上海": "上海市",
                    "重庆": "重庆市",
                    "广西": "广西壮族自治区",
                    "内蒙古": "内蒙古自治区",
                    "西藏": "西藏自治区",
                    "宁夏": "宁夏回族自治区",
                    "新疆": "新疆维吾尔自治区",
                    "贵州": "贵州省",
                    "四川": "四川省",
                    "云南": "云南省",
                    "山东": "山东省",
                    "山西": "山西省",
                    "河南": "河南省",
                    "河北": "河北省",
                    "湖南": "湖南省",
                    "湖北": "湖北省",
                    "广东": "广东省",
                    "江苏": "江苏省",
                    "浙江": "浙江省",
                    "安徽": "安徽省",
                    "福建": "福建省",
                    "江西": "江西省",
                    "辽宁": "辽宁省",
                    "吉林": "吉林省",
                    "黑龙江": "黑龙江省",
                    "陕西": "陕西省",
                    "甘肃": "甘肃省",
                    "青海": "青海省",
                    "海南": "海南省",
                    "台湾": "台湾省",
                    "香港": "香港特别行政区",
                    "澳门": "澳门特别行政区"
                };
                if (map[province]) return map[province];
                if (province.includes("省")) return province;
                return province + "省";
            }

            function inferProvinceFromCity(city) { return cityToProvinceMap[city] || "未知省份"; }

            function enhanceOrdersWithProvince(orders) {
                for (let o of orders) {
                    if (!o.province || o.province === "") {
                        if (o.city && o.city !== "未知城市" && o.city !== "隐私地址" && o.city !== "其他城市") o.province =
                            inferProvinceFromCity(o.city);
                        else o.province = "未知省份";
                    }
                    o.province = normalizeProvinceName(o.province);
                    if (!o.city || o.city === "") o.city = "未知城市";
                    if (o.city === "隐私地址") o.city = "未知城市";
                }
                return orders;
            }

            function extractCityFromAddress(address) {
                if (!address || typeof address !== 'string') return "未知城市";
                address = address.trim();
                if (address.includes("隐私保护") || address.includes("地址已隐藏") || address.startsWith("[隐私保护]")) return "未知城市";
                let cityMatch = address.match(/([\u4e00-\u9fa5]{2,7}?(?:市|自治州|地区))/);
                if (cityMatch) return cityMatch[1].replace(/市$|自治州$|地区$/, '');
                let complexMatch = address.match(/(?:省|自治区|市)([\u4e00-\u9fa5]{2,6}?(?:市|区))/);
                if (complexMatch) return complexMatch[1].replace(/市$|区$/, '');
                const cities = ["北京", "上海", "广州", "深圳", "成都", "重庆", "杭州", "武汉", "西安", "天津", "南京", "郑州", "长沙", "沈阳", "青岛",
                    "济南", "福州", "厦门", "贵阳", "昆明", "海口", "三亚", "合肥", "南昌", "南宁", "哈尔滨", "长春", "太原", "石家庄", "兰州",
                    "西宁", "银川", "乌鲁木齐", "呼和浩特", "拉萨"
                ];
                for (let city of cities)
                    if (address.includes(city)) return city;
                return "其他城市";
            }

            function parseOrders(rows) {
                if (!rows || rows.length < 2) return { orders: [], colIdx: null };
                const headers = rows[0];
                const colIdx = { store: -1, storeName: -1, channel: -1, status: -1, verify: -1, amount: -1, address: -1,
                    orderTime: -1, deliveryDist: -1, deliveryMethod: -1, province: -1, city: -1 };

                const normalizeHeader = (s) => {
                    if (typeof s !== 'string') return '';
                    return s.trim().replace(/\s+/g, ' ');
                };

                headers.forEach((h, idx) => {
                    const raw = String(h || "").trim();
                    const norm = normalizeHeader(raw);

                    if (norm === "渠道" || norm === "渠道名称") colIdx.channel = idx;
                    if (norm === "订单状态") colIdx.status = idx;
                    if (norm === "核销状态") colIdx.verify = idx;
                    if (norm === "商品总金额" || norm === "订单金额") colIdx.amount = idx;
                    if (norm === "用户地址") colIdx.address = idx;
                    if (norm === "支付时间") colIdx.orderTime = idx;
                    if (norm === "配送距离(km)" || norm === "配送距离") colIdx.deliveryDist = idx;
                    if (norm === "配送方式") colIdx.deliveryMethod = idx;
                    if (norm === "省份") colIdx.province = idx;
                    if (norm === "城市") colIdx.city = idx;

                    if (norm === "商家门店编码" || norm === "门店编码") {
                        colIdx.store = idx;
                        console.log(`✅ 门店编码列匹配: ${norm}`);
                    }
                    if (norm === "门店名称") {
                        colIdx.storeName = idx;
                    }
                });

                if (colIdx.store === -1) {
                    for (let i = 0; i < headers.length; i++) {
                        const raw = String(headers[i] || "").trim();
                        if (raw.includes("商家门店编码") || raw.includes("门店编码")) {
                            colIdx.store = i;
                            break;
                        }
                    }
                }

                const missingCols = [];
                if (colIdx.channel === -1) missingCols.push("渠道");
                if (colIdx.status === -1) missingCols.push("订单状态");
                if (colIdx.amount === -1) missingCols.push("商品总金额");
                if (missingCols.length > 0) {
                    resetFadeOutState();
                    alert(`缺少必要列：${missingCols.join("、")}，请检查Excel表头是否包含这些列。`);
                    return { orders: [], colIdx: null };
                }

                const orders = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row) continue;
                    let channel = colIdx.channel !== -1 ? String(row[colIdx.channel] || "").trim() : "";
                    if (!channel) continue;
                    const status = colIdx.status !== -1 ? String(row[colIdx.status] || "").trim() : "";
                    const verify = colIdx.verify !== -1 ? String(row[colIdx.verify] || "").trim() : "";
                    let amount = parseFloat(String(row[colIdx.amount] || "0").replace(/[^0-9.-]/g, '')) || 0;
                    let address = colIdx.address !== -1 ? String(row[colIdx.address] || "") : "";

                    let province = (colIdx.province !== -1 && row[colIdx.province]) ? String(row[colIdx.province]).trim() :
                    "";
                    let city = (colIdx.city !== -1 && row[colIdx.city]) ? String(row[colIdx.city]).trim() : "";

                    if (!city || city === "") city = extractCityFromAddress(address);
                    if (!province || province === "") province = (city && city !== "未知城市" && city !== "隐私地址") ?
                        inferProvinceFromCity(city) : "未知省份";

                    let storeCode = "";
                    if (colIdx.store !== -1) {
                        const val = row[colIdx.store];
                        if (val !== undefined && val !== null) storeCode = String(val).trim();
                    }
                    let storeName = "";
                    if (colIdx.storeName !== -1) {
                        const val = row[colIdx.storeName];
                        if (val !== undefined && val !== null) storeName = String(val).trim();
                    }
                    let orderTime = null;
                    if (colIdx.orderTime !== -1 && row[colIdx.orderTime]) {
                        let timeVal = row[colIdx.orderTime];
                        if (typeof timeVal === 'number') {
                            let date = new Date((timeVal - 25569) * 86400000);
                            if (!isNaN(date)) orderTime = date;
                        } else {
                            let parsed = new Date(timeVal);
                            if (!isNaN(parsed)) orderTime = parsed;
                        }
                    }
                    let deliveryDist = (colIdx.deliveryDist !== -1 && row[colIdx.deliveryDist]) ? parseFloat(row[colIdx
                        .deliveryDist]) : null;
                    let deliveryMethod = (colIdx.deliveryMethod !== -1 && row[colIdx.deliveryMethod]) ? String(row[colIdx
                        .deliveryMethod]).trim() : "未知";
                    orders.push({ channel, status, verify, amount, address, city, province, storeCode, storeName,
                        orderTime, deliveryDist, deliveryMethod });
                }

                if (colIdx.store !== -1 && orders.length > 0 && orders.every(o => !o.storeCode)) {
                    const sample = orders.slice(0, 3).map(o => `"${o.storeCode}"`).join(", ");
                    alert(`提示：检测到“商家门店编码”列，但所有订单的门店编码均为空。\n前3条示例：${sample}\n请检查该列数据。`);
                }
                return { orders, colIdx };
            }

            function cacheOrders(orders) { try { localStorage.setItem('cachedOrders', JSON.stringify(orders)); } catch (e) {} }

            function loadCachedOrders() { const c = localStorage.getItem('cachedOrders'); return c ? JSON.parse(c) : null; }

            function clearCache() { localStorage.removeItem('cachedOrders'); }

            function filterOrdersByProvince(province) {
                if (province === "全国") return allOrders;
                return allOrders.filter(o => o.province === province);
            }

            function renderKPI(orders) {
                const totalOrders = orders.length;
                let totalAmount = 0,
                    completed = 0;
                let totalDistSum = 0,
                    totalDistCount = 0;
                orders.forEach(order => {
                    totalAmount += order.amount;
                    if (order.status === "完成") completed++;
                    if (order.deliveryDist !== null && !isNaN(order.deliveryDist)) {
                        totalDistSum += order.deliveryDist;
                        totalDistCount++;
                    }
                });
                const completeRate = totalOrders ? (completed / totalOrders * 100).toFixed(1) : "0";
                const avgAmount = totalOrders ? (totalAmount / totalOrders).toFixed(1) : "0";
                const avgDist = totalDistCount > 0 ? (totalDistSum / totalDistCount).toFixed(2) : "-";
                document.getElementById("kpiArea").innerHTML = `
                    <div class="kpi-card"><div class="kpi-icon"><i class="fas fa-receipt"></i></div><div class="kpi-content"><h3>总订单</h3><div class="kpi-main">${totalOrders.toLocaleString()}</div></div></div>
                    <div class="kpi-card"><div class="kpi-icon"><i class="fas fa-cny"></i></div><div class="kpi-content"><h3>商品总金额</h3><div class="kpi-main">¥${totalAmount.toFixed(0).toLocaleString()}</div></div></div>
                    <div class="kpi-card"><div class="kpi-icon"><i class="fas fa-calculator"></i></div><div class="kpi-content"><h3>平均订单额</h3><div class="kpi-main">¥${avgAmount}</div></div></div>
                    <div class="kpi-card"><div class="kpi-icon"><i class="fas fa-check-circle"></i></div><div class="kpi-content"><h3>完成率</h3><div class="kpi-main">${completeRate}%</div></div></div>
                    <div class="kpi-card"><div class="kpi-icon"><i class="fas fa-road"></i></div><div class="kpi-content"><h3>平均配送距离</h3><div class="kpi-main">${avgDist} km</div></div></div>
                `;
            }

            function getMaxOrderDate(orders) {
                const validDates = orders.filter(o => o.orderTime && !isNaN(o.orderTime.getTime())).map(o => o.orderTime);
                if (validDates.length === 0) return new Date();
                return new Date(Math.max(...validDates.map(d => d.getTime())));
            }

            function getLast7DaysRange(orders) {
                const maxDate = getMaxOrderDate(orders);
                const currentEnd = new Date(maxDate);
                currentEnd.setHours(23, 59, 59, 999);
                const currentStart = new Date(currentEnd);
                currentStart.setDate(currentEnd.getDate() - 6);
                currentStart.setHours(0, 0, 0, 0);
                const prevEnd = new Date(currentStart);
                prevEnd.setDate(prevEnd.getDate() - 1);
                prevEnd.setHours(23, 59, 59, 999);
                const prevStart = new Date(prevEnd);
                prevStart.setDate(prevEnd.getDate() - 6);
                prevStart.setHours(0, 0, 0, 0);
                return { currentStart, currentEnd, prevStart, prevEnd };
            }

            function getCurrentWeekRange(orders) {
                const maxDate = getMaxOrderDate(orders);
                const day = maxDate.getDay();
                let diffToMonday = day === 0 ? 6 : day - 1;
                const currentMonday = new Date(maxDate);
                currentMonday.setDate(maxDate.getDate() - diffToMonday);
                currentMonday.setHours(0, 0, 0, 0);
                const currentSunday = new Date(currentMonday);
                currentSunday.setDate(currentMonday.getDate() + 6);
                currentSunday.setHours(23, 59, 59, 999);
                const prevMonday = new Date(currentMonday);
                prevMonday.setDate(currentMonday.getDate() - 7);
                const prevSunday = new Date(prevMonday);
                prevSunday.setDate(prevMonday.getDate() + 6);
                prevSunday.setHours(23, 59, 59, 999);
                return { currentStart: currentMonday, currentEnd: currentSunday, prevStart: prevMonday, prevEnd: prevSunday };
            }

            function getCurrentMonthRange(orders) {
                const maxDate = getMaxOrderDate(orders);
                const currentStart = new Date(maxDate.getFullYear(), maxDate.getMonth(), 1);
                currentStart.setHours(0, 0, 0, 0);
                const currentEnd = new Date(maxDate.getFullYear(), maxDate.getMonth() + 1, 0);
                currentEnd.setHours(23, 59, 59, 999);
                const prevStart = new Date(currentStart);
                prevStart.setMonth(prevStart.getMonth() - 1);
                const prevEnd = new Date(currentStart);
                prevEnd.setDate(0);
                prevEnd.setHours(23, 59, 59, 999);
                return { currentStart, currentEnd, prevStart, prevEnd };
            }

            function getDefaultDateRangeFromOrders(orders) {
                if (!orders || orders.length === 0) {
                    const now = new Date();
                    const end = new Date(now);
                    end.setHours(0, 0, 0, 0);
                    const start = new Date(end);
                    start.setDate(end.getDate() - 6);
                    return { startDate: start, endDate: end };
                }
                const validDates = orders.filter(o => o.orderTime && !isNaN(o.orderTime.getTime())).map(o => o.orderTime);
                if (validDates.length === 0) {
                    const now = new Date();
                    const end = new Date(now);
                    end.setHours(0, 0, 0, 0);
                    const start = new Date(end);
                    start.setDate(end.getDate() - 6);
                    return { startDate: start, endDate: end };
                }
                const maxDate = new Date(Math.max(...validDates.map(d => d.getTime())));
                maxDate.setHours(0, 0, 0, 0);
                const endDate = new Date(maxDate);
                const startDate = new Date(endDate);
                startDate.setDate(endDate.getDate() - 6);
                return { startDate, endDate };
            }

            function calculateWeekOverWeekForRange(startDate, endDate, orders) {
                if (!orders.length || !startDate || !endDate) return null;
                const validOrders = orders.filter(o => o.orderTime && !isNaN(o.orderTime.getTime()));
                if (validOrders.length === 0) return null;
                const dayDiff = Math.ceil((endDate - startDate) / (1000 * 3600 * 24)) + 1;
                const prevStartDate = new Date(startDate);
                prevStartDate.setDate(startDate.getDate() - dayDiff);
                const prevEndDate = new Date(endDate);
                prevEndDate.setDate(endDate.getDate() - dayDiff);

                function sumOrdersInRange(start, end) {
                    let total = 0,
                        amount = 0,
                        completed = 0;
                    validOrders.forEach(o => {
                        const t = o.orderTime.getTime();
                        if (t >= start.getTime() && t <= end.getTime() + 86400000 - 1) {
                            total++;
                            amount += o.amount;
                            if (o.status === "完成") completed++;
                        }
                    });
                    const completeRate = total ? (completed / total * 100) : 0;
                    return { total, amount, completeRate };
                }
                const current = sumOrdersInRange(startDate, endDate);
                const previous = sumOrdersInRange(prevStartDate, prevEndDate);
                if (previous.total === 0) return null;
                const orderChange = ((current.total - previous.total) / previous.total * 100).toFixed(1);
                const amountChange = ((current.amount - previous.amount) / previous.amount * 100).toFixed(1);
                const rateChange = (current.completeRate - previous.completeRate).toFixed(1);
                return { current, previous, orderChange, amountChange, rateChange, hasPrevData: true, startDate, endDate,
                    prevStartDate, prevEndDate };
            }

            function renderCityDistribution(ordersForCity) {
                const container = document.getElementById("allCityContainer");
                if (!container) return;
                if (!ordersForCity.length) { container.innerHTML = "<div class='badge warning'>该范围暂无订单数据</div>"; return; }

                // 总订单数（包含未知城市，作为占比分母）
                const totalOrders = ordersForCity.length;

                // 统计各城市订单数（排除未知城市）
                const cityCount = new Map();
                ordersForCity.forEach(order => {
                    let cityName = order.city || "未知城市";
                    if (cityName === "未知城市") return;
                    cityCount.set(cityName, (cityCount.get(cityName) || 0) + 1);
                });

                const rawVal = parseInt(document.getElementById("cityTopNSelect")?.value) || 10;
                const topN = Math.abs(rawVal);
                const reverse = rawVal < 0;
                const sortedCities = Array.from(cityCount.entries())
                    .map(([city, cnt]) => ({ city, cnt }))
                    .sort((a, b) => reverse ? a.cnt - b.cnt : b.cnt - a.cnt)
                    .slice(0, topN);

                if (sortedCities.length === 0) {
                    container.innerHTML = `<div class="badge warning">当前筛选范围内无有效城市数据（隐私地址已过滤）</div>`;
                    return;
                }

                const maxCnt = sortedCities[0].cnt;
                let cityHtml = `<div class="city-list">`;
                sortedCities.forEach(city => {
                    // 柱条宽度基于最大值比例
                    const barWidth = (city.cnt / maxCnt * 100).toFixed(1);
                    // 计算占比（占当前筛选总订单数的百分比）
                    const ratio = (city.cnt / totalOrders * 100).toFixed(1);
                    cityHtml += `
                        <div class="city-bar-item">
                            <span class="city-name" title="${escapeHtml(city.city)}">${escapeHtml(city.city)}</span>
                            <div class="bar-bg">
                                <div class="bar-fill" style="width: ${barWidth}%;"></div>
                            </div>
                            <span class="city-count">${city.cnt}单 (${ratio}%)</span>
                        </div>
                    `;
                });
                cityHtml += `</div>`;
                container.innerHTML = cityHtml;
            }

                const citySelect = document.getElementById("storeCitySelect");

                provinceFilteredOrders.forEach(order => {
                    if (order.city && order.city !== "未知城市" && order.city !== "") {
                        citySet.add(order.city);
                    }
                });
                const otherCities = Array.from(citySet).filter(c => c !== "全国").sort();
                citySelect.innerHTML = "";
                const allOption = document.createElement("option");
                allOption.value = "全国";
                allOption.textContent = "全部";
                if (currentSelectedStoreCity === "全国") allOption.selected = true;
                citySelect.appendChild(allOption);
                otherCities.forEach(city => {
                    const option = document.createElement("option");
                    option.value = city;
                    option.textContent = city;
                    if (currentSelectedStoreCity === city) option.selected = true;
                    citySelect.appendChild(option);
                });
                if (!otherCities.includes(currentSelectedStoreCity) && currentSelectedStoreCity !== "全国") {
                    currentSelectedStoreCity = "全国";
                    citySelect.value = "全国";
                }
                citySelect.onchange = (e) => {
                    currentSelectedStoreCity = e.target.value;
                    currentStorePage = 1;
                    currentStoreSearch = "";

                    if (searchInput) searchInput.value = "";

            function getStoreListForCurrentView() {
                const provinceOrders = filterOrdersByProvince(currentSelectedProvince);
                let filteredOrders = provinceOrders;
                if (currentSelectedStoreCity !== "全国") {
                    filteredOrders = provinceOrders.filter(o => o.city === currentSelectedStoreCity);
                }
                const validStoreOrders = filteredOrders.filter(o => o.storeCode && o.storeCode.trim() !== "");
                if (validStoreOrders.length === 0) return [];
                const storeMap = new Map();
                for (const order of validStoreOrders) {
                    const code = order.storeCode;
                    if (!storeMap.has(code)) {
                        storeMap.set(code, { orders: 0, amount: 0, completed: 0, storeName: order.storeName || "", city: order.city || "" });
                    }
                    const stat = storeMap.get(code);
                    stat.orders++;
                    stat.amount += order.amount;
                    if (order.status === "完成") stat.completed++;
                    if (!stat.storeName && order.storeName) stat.storeName = order.storeName;
                }
                let storeList = Array.from(storeMap.entries()).map(([code, data]) => ({
                    code,
                    storeName: data.storeName || "--",
                    city: data.city || "--",
                    orders: data.orders,
                    amount: data.amount,
                    completeRate: (data.completed / data.orders * 100).toFixed(1)
                }));
                storeList.sort((a, b) => b.orders - a.orders);
                return storeList;
            }

            function renderStoreRankingWithPagination() {
                const container = document.getElementById("storeRankingContent");
                if (!container) return;
                let storeList = getStoreListForCurrentView();
                if (currentStoreSearch.trim() !== "") {
                    const searchLower = currentStoreSearch.trim().toLowerCase();
                    storeList = storeList.filter(store =>
                        store.code.toLowerCase().includes(searchLower) ||
                        store.storeName.toLowerCase().includes(searchLower)
                    );
                }
                currentStoreList = storeList;
                const totalPages = Math.ceil(storeList.length / storePageSize);
                if (totalPages === 0) {
                    container.innerHTML = `<div class="badge warning">当前筛选条件下无门店数据</div>`;
                    document.getElementById("storePagination").innerHTML = "";
                    return;
                }
                if (currentStorePage > totalPages) currentStorePage = totalPages;
                const start = (currentStorePage - 1) * storePageSize;
                const pageStores = storeList.slice(start, start + storePageSize);
                let tableHtml =
                    `<table class="table-mini" style="width:100%; min-width:700px;"><thead><tr><th>门店编码</th><th>门店名称</th><th>城市</th><th>订单数</th><th>总金额(¥)</th><th>均价(¥)</th><th>完成率</th></tr></thead><tbody>`;
                for (const store of pageStores) {
                    const avgAmount = (store.amount / store.orders).toFixed(1);
                    tableHtml +=
                        `<tr><td style="font-weight:500;">${escapeHtml(store.code)}</td><td>${escapeHtml(store.storeName)}</td><td>${escapeHtml(store.city)}</td><td>${store.orders}</td><td>${store.amount.toFixed(0)}</td><td>${avgAmount}</td><td>${store.completeRate}%</td></tr>`;
                }
                tableHtml += `</tbody>`;
                container.innerHTML = tableHtml;
                let paginationHtml = `<div style="display:flex; justify-content:flex-end; gap:8px; margin-top:12px; flex-wrap:wrap;">`;
                if (currentStorePage > 1) paginationHtml +=
                    `<button class="page-btn" data-page="${currentStorePage-1}">上一页</button>`;
                for (let i = 1; i <= totalPages; i++) {
                    if (i === currentStorePage) paginationHtml +=
                        `<button class="page-btn active" data-page="${i}">${i}</button>`;
                    else if (Math.abs(i - currentStorePage) <= 2 || i === 1 || i === totalPages) paginationHtml +=
                        `<button class="page-btn" data-page="${i}">${i}</button>`;
                    else if (i === currentStorePage - 3 || i === currentStorePage + 3) paginationHtml += `<span>...</span>`;
                }
                if (currentStorePage < totalPages) paginationHtml +=
                    `<button class="page-btn" data-page="${currentStorePage+1}">下一页</button>`;
                paginationHtml += `</div>`;
                document.getElementById("storePagination").innerHTML = paginationHtml;
                document.querySelectorAll(".page-btn").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        const page = parseInt(btn.dataset.page);
                        if (!isNaN(page)) {
                            currentStorePage = page;
                            renderStoreRankingWithPagination();
                        }
                    });
                });
            }

                }

                const totalAmount = Array.from(channelMap.values()).reduce((s, d) => s + d.amount, 0);
                const avgAmount = totalOrders ? (totalAmount / totalOrders).toFixed(1) : 0;
                const totalCancel = Array.from(channelMap.values()).reduce((s, d) => s + d.cancel, 0);
                const totalCancelRate = totalOrders ? (totalCancel / totalOrders * 100).toFixed(1) : 0;
                tableHtml +=
                    `<tr style="background:#f9fafb; font-weight:600;"><td>合计/平均</td><td>${totalOrders}</td><td>${totalAmount.toFixed(0)}</td><td>${avgAmount}</td><td>${totalCancel}</td><td>${totalCancelRate}%</td></tr></tbody>`;
                document.getElementById("channelTable").innerHTML = tableHtml;
                const badgeContainer = document.getElementById("channelBadges");

                }
                channelChart = new Chart(pieCtx, { type: 'pie', data: { labels: pieLabels, datasets: [{ data: pieData,
                            backgroundColor: pieColors, borderWidth: 0 }] }, options: { responsive: true,
                        maintainAspectRatio: true, plugins: { legend: { display: false } } } });
                const pieNoteDiv = document.getElementById("pieNote");
                pieNoteDiv.innerHTML = '';
                for (let [ch, data] of channelMap.entries()) {
                    const col = localColorMap.get(ch);
                    const percentage = ((data.orders / totalOrders) * 100).toFixed(1);
                    const badge = document.createElement('span');
                    badge.className = 'pie-label-badge';
                    badge.style.background = `${col}20`;
                    badge.style.color = col;
                    badge.innerHTML =
                        `<i class="fas fa-circle" style="color:${col}; font-size:8px;"></i> ${escapeHtml(ch)} ${data.orders} (${percentage}%)`;
                    pieNoteDiv.appendChild(badge);

            function refreshProvinceSelector(keyword) {
                const selectEl = document.getElementById("provinceSelect");
                if (!selectEl) return;
                let filtered = allProvinceList;
                if (keyword && keyword.trim() !== "") {
                    const lowerKeyword = keyword.trim().toLowerCase();
                    filtered = allProvinceList.filter(prov => prov.toLowerCase().includes(lowerKeyword));
                }
                selectEl.innerHTML = "";
                filtered.forEach(prov => {
                    const option = document.createElement("option");
                    option.value = prov;
                    option.textContent = prov;
                    if (currentSelectedProvince === prov) option.selected = true;
                    selectEl.appendChild(option);
                });
                if (filtered.length > 0 && !filtered.includes(currentSelectedProvince)) {
                    currentSelectedProvince = filtered[0];
                    selectEl.value = currentSelectedProvince;
                    const filteredOrders = filterOrdersByProvince(currentSelectedProvince);
                    renderCityDistribution(filteredOrders);
                    renderDynamicModules(filteredOrders);

                    renderChannelModules(filteredOrders, currentSelectedProvince);
                    renderKPI(filteredOrders);
                    renderWeekOverWeekCard(filteredOrders);
                    currentSelectedStoreCity = "全国";
                    buildStoreCitySelector(filteredOrders);
                    currentStorePage = 1;
                    currentStoreSearch = "";
                    const searchInput = document.getElementById("storeSearchInput");
                    if (searchInput) searchInput.value = "";
                    renderStoreRankingWithPagination();
                }
            }

            function buildProvinceSelector() {
                const selectEl = document.getElementById("provinceSelect");
                if (!selectEl) return;
                const provinceSet = new Set();
                provinceSet.add("全国");
                allOrders.forEach(order => {
                    if (order.province && order.province !== "未知省份" && order.province.trim() !== "") {
                        provinceSet.add(order.province);
                    }
                });
                allProvinceList = Array.from(provinceSet).sort((a, b) => {
                    if (a === "全国") return -1;
                    if (b === "全国") return 1;
                    return a.localeCompare(b);
                });
                refreshProvinceSelector("");
                selectEl.onchange = (e) => {
                    currentSelectedProvince = e.target.value;
                    const filtered = filterOrdersByProvince(currentSelectedProvince);
                    renderCityDistribution(filtered);
                    renderDynamicModules(filtered);

                    renderChannelModules(filtered, currentSelectedProvince);
                    renderKPI(filtered);
                    renderWeekOverWeekCard(filtered);
                    currentSelectedStoreCity = "全国";
                    buildStoreCitySelector(filtered);
                    currentStorePage = 1;
                    currentStoreSearch = "";
                    const searchInput = document.getElementById("storeSearchInput");
                    if (searchInput) searchInput.value = "";
                    renderStoreRankingWithPagination();
                };
                const searchInput = document.getElementById("provinceSearchInput");
                if (searchInput) {
                    searchInput.addEventListener("input", (e) => {
                        refreshProvinceSelector(e.target.value);
                    });
                }
            }

                if (!allOrders.length) { alert("暂无数据可导出，请先上传订单文件"); return; }
                const exportData = allOrders.map((order, idx) => ({
                    "序号": idx + 1,
                    "渠道": order.channel,
                    "订单状态": order.status,
                    "核销状态": order.verify,
                    "商品总金额": order.amount,
                    "城市": order.city,
                    "省份": order.province,
                    "门店编码": order.storeCode || "",
                    "门店名称": order.storeName || "",
                    "配送距离(km)": order.deliveryDist !== null ? order.deliveryDist : "",
                   "配送方式": order.deliveryMethod,
                   "支付时间": order.orderTime ? order.orderTime.toLocaleString('zh-CN') : "",
               }));
               const ws = XLSX.utils.json_to_sheet(exportData);
               ws['!cols'] = [{ wch: 8 }, { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 15 }, { wch: 15 },
                { wch: 15 }, { wch: 20 }, { wch: 12 }, { wch: 10 }, { wch: 20 }];
               const wb = XLSX.utils.book_new();

                XLSX.writeFile(wb, fileName);
           }

            function renderDynamicModules(orders) {
                if (!orders.length) {
                    document.getElementById("healthStatusContainer").innerHTML =
                        `<div class="badge warning">所选范围无订单数据</div>`;
                    document.getElementById("deliveryDistancePanel").innerHTML = `<div class="badge warning">无配送数据</div>`;
                    document.getElementById("hourlyPanel").innerHTML = `<div class="badge warning">无时段数据</div>`;
                    document.getElementById("trendAnalysis").innerHTML = `<div class="badge warning">无趋势数据</div>`;
                    document.getElementById("amountAnalysis").innerHTML = `<div class="badge warning">无金额数据</div>`;
                    document.getElementById("insightText").innerHTML = `<i class="fas fa-chart-simple"></i> 当前省份无订单，请切换筛选`;
                    renderStoreRankingWithPagination();
                    return;
                }
                const totalOrders = orders.length;
                let totalAmount = 0,
                    completed = 0,
                    cancelled = 0,
                    verifySuccess = 0,
                    verifyFail = 0,
                    notVerify = 0;
                const failStoreMap = new Map();
                let completedAmount = 0,
                    cancelledAmount = 0;
                const dateMap = new Map();
                const hourlyMap = new Map();
                const deliveryDistByChannel = new Map();
                let totalDistSum = 0,
                    totalDistCount = 0;
                const cityAmountMap = new Map();
                orders.forEach(order => {
                    totalAmount += order.amount;
                    if (order.status === "取消") { cancelled++;
                        cancelledAmount += order.amount; } else if (order.status === "完成") { completed++;
                        completedAmount += order.amount; }
                    if (order.verify === "核销成功") verifySuccess++;
                    else if (order.verify === "核销失败") { verifyFail++; if (order.storeCode) failStoreMap.set(order
                            .storeCode, (failStoreMap.get(order.storeCode) || 0) + 1); } else if (order.verify ===
                        "不核销" || (order.verify && order.verify.includes("未核销"))) notVerify++;
                    if (order.orderTime && !isNaN(order.orderTime.getTime())) {
                        const dateStr = order.orderTime.toISOString().slice(0, 10);
                        if (!dateMap.has(dateStr)) dateMap.set(dateStr, { total: 0, success: 0 });
                        let rec = dateMap.get(dateStr);
                        rec.total++;
                        if (order.verify === "核销成功") rec.success++;
                        const hour = order.orderTime.getHours();
                        if (!hourlyMap.has(hour)) hourlyMap.set(hour, { total: 0, success: 0 });
                        let hourRec = hourlyMap.get(hour);
                        hourRec.total++;
                        if (order.verify === "核销成功") hourRec.success++;
                    }
                    if (order.deliveryDist !== null && !isNaN(order.deliveryDist)) {
                        totalDistSum += order.deliveryDist;
                        totalDistCount++;
                        const ch = order.channel;
                        if (!deliveryDistByChannel.has(ch)) deliveryDistByChannel.set(ch, { total: 0, count: 0 });
                        let d = deliveryDistByChannel.get(ch);
                        d.total += order.deliveryDist;
                        d.count++;
                    }
                    if (order.city && order.city !== "未知城市") {
                        if (!cityAmountMap.has(order.city)) cityAmountMap.set(order.city, { sum: 0, cnt: 0 });
                        let ca = cityAmountMap.get(order.city);
                        ca.sum += order.amount;
                        ca.cnt++;
                    }
                });
                const avgDistOverall = totalDistCount > 0 ? (totalDistSum / totalDistCount).toFixed(2) : "N/A";
                const completionPercent = totalOrders ? (completed / totalOrders * 100).toFixed(1) : "0";
                const cancelPercent = totalOrders ? (cancelled / totalOrders * 100).toFixed(1) : "0";
                let failStoreHtml = "";
                if (verifyFail > 0 && failStoreMap.size > 0) {
                    const topStores = Array.from(failStoreMap.entries()).sort((a, b) => b[1] - a[1]).slice(0, 5);
                    failStoreHtml =
                        `<div class="fail-store-list"><strong><i class="fas fa-store"></i> 核销失败门店TOP5</strong><br>${topStores.map(([code, cnt]) => `<span class="store-tag">${escapeHtml(code)} (${cnt}次)</span>`).join('')}</div>`;
                } else if (verifyFail > 0) { failStoreHtml =
                    `<div class="fail-store-list"><span class="badge warning">未检测到门店编码</span></div>`; }
                document.getElementById("healthStatusContainer").innerHTML =
                    `<div class="health-overview"><div class="health-stat"><i class="fas fa-check-circle" style="color:#16a34a;"></i><div class="health-number">${completionPercent}%</div><div>完成率</div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${completionPercent}%; background:#16a34a;"></div></div><small>${completed}单</small></div><div class="health-stat"><i class="fas fa-times-circle" style="color:#dc2626;"></i><div class="health-number">${cancelPercent}%</div><div>取消率</div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${cancelPercent}%; background:#dc2626;"></div></div><small>${cancelled}单</small></div><div class="health-stat"><i class="fas fa-stamp" style="color:#f97316;"></i><div class="health-number">${verifySuccess}</div><div>核销成功</div><div>失败 ${verifyFail} / 未核销 ${notVerify}</div></div></div>${verifyFail > 0 ? `<div class="badge danger"><i class="fas fa-exclamation-triangle"></i> 共 ${verifyFail} 笔核销失败</div>` : `<div class="badge success"><i class="fas fa-check-circle"></i> 核销健康无失败</div>`}${failStoreHtml}`;
                let channelDistHtml = "";
                let maxDist = 0;
                for (let [ch, data] of deliveryDistByChannel.entries()) { let avg = (data.total / data.count).toFixed(2);
                    maxDist = Math.max(maxDist, parseFloat(avg)); }
                for (let [ch, data] of deliveryDistByChannel.entries()) { let avg = (data.total / data.count).toFixed(2);
                    let widthPercent = maxDist > 0 ? (avg / maxDist * 100) : 0;
                    channelDistHtml +=
                        `<div class="dist-bar-item"><span style="width:80px;">${escapeHtml(ch)}</span><div class="dist-bar-bg"><div class="dist-bar-fill" style="width: ${widthPercent}%;"></div></div><span style="width:60px; text-align:right;">${avg} km</span></div>`; }
                if (deliveryDistByChannel.size === 0) channelDistHtml = "<p>无配送距离数据</p>";
                let cityDistMap = new Map();
                orders.forEach(o => { if (o.deliveryDist !== null && !isNaN(o.deliveryDist) && o.city && o.city !==
                        "未知城市") { if (!cityDistMap.has(o.city)) cityDistMap.set(o.city, { sum: 0, cnt: 0 }); let d =
                            cityDistMap.get(o.city);
                        d.sum += o.deliveryDist;
                        d.cnt++; } });
                let cityDistAvg = Array.from(cityDistMap.entries()).map(([city, data]) => ({ city, avg: data.sum / data
                        .cnt })).sort((a, b) => b.avg - a.avg).slice(0, 3);
                let farthestCitiesHtml = cityDistAvg.map(c =>
                    `<span class="badge" style="background:#0f766e20; color:#0f766e;">${escapeHtml(c.city)} ${c.avg.toFixed(2)}km</span>`
                    ).join(' ');
                document.getElementById("deliveryDistancePanel").innerHTML =
                    `<div class="dist-flex"><div class="dist-avg-card"><div><i class="fas fa-chart-line"></i> 整体平均</div><div class="dist-avg-number">${avgDistOverall} km</div><div>基于 ${totalDistCount} 笔订单</div></div><div class="dist-channels"><strong><i class="fas fa-truck"></i> 各渠道平均配送距离</strong>${channelDistHtml}</div></div><div class="farthest-cities"><strong><i class="fas fa-city"></i> 平均距离最远城市TOP3</strong> ${farthestCitiesHtml || '无数据'}</div>`;
                const hourLabels = Array.from({ length: 24 }, (_, i) => `${i}:00`);
                const hourTotal = [],
                    hourSuccessRate = [];
                for (let h = 0; h < 24; h++) { let data = hourlyMap.get(h) || { total: 0, success: 0 };
                    hourTotal.push(data.total);
                    hourSuccessRate.push(data.total > 0 ? (data.success / data.total * 100).toFixed(1) : 0); }
                const hourCtx = document.createElement('canvas');
                hourCtx.style.width = '100%';
                hourCtx.style.height = '100%';
                hourCtx.style.display = 'block';
                hourCtx.id = 'hourlyChartCanvas';
                const hourlyPanel = document.getElementById("hourlyPanel");
                hourlyPanel.innerHTML = '';
                hourlyPanel.appendChild(hourCtx);
                if (hourlyChart) hourlyChart.destroy();
                hourlyChart = new Chart(hourCtx.getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: hourLabels,
                        datasets: [
                            { label: '订单数', data: hourTotal, backgroundColor: '#f97316', yAxisID: 'y' },
                            { label: '核销成功率 (%)', data: hourSuccessRate, type: 'line',
                                borderColor: '#10b981', backgroundColor: 'transparent', borderDash: [5, 5],
                                yAxisID: 'y1' }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { tooltip: { mode: 'index' } },
                        scales: {
                            y: { beginAtZero: true, title: { display: true, text: '订单数' } },
                            y1: { position: 'right', beginAtZero: true, max: 100, title: { display: true,
                                    text: '成功率(%)' }, grid: { drawOnChartArea: false } }
                        }
                    }
                });
                const trendDiv = document.getElementById("trendAnalysis");
                if (dateMap.size === 0) {
                    trendDiv.innerHTML = `<div class="no-data-tip">未检测到“支付时间”列</div>`;
                    if (trendChart) trendChart.destroy();
                } else {
                    const sorted = Array.from(dateMap.keys()).sort();
                    const last30 = sorted.slice(-30);
                    const labels = last30.map(d => d.slice(5));
                    const totalData = last30.map(d => dateMap.get(d).total);
                    const rateData = last30.map(d => dateMap.get(d).total ? (dateMap.get(d).success / dateMap.get(d)
                        .total * 100).toFixed(1) : 0);
                    trendDiv.innerHTML =
                        `<canvas id="trendChartCanvas" style="width:100%; height:100%; display:block;"></canvas>`;
                    const ctx = document.getElementById('trendChartCanvas').getContext('2d');
                    if (trendChart) trendChart.destroy();
                    trendChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [
                                { label: '订单总数', data: totalData, borderColor: '#f97316',
                                    backgroundColor: 'rgba(249,115,22,0.1)', fill: true, tension: 0.3,
                                    yAxisID: 'y' },
                                { label: '核销成功率(%)', data: rateData, borderColor: '#10b981',
                                    borderDash: [5, 5], tension: 0.3, yAxisID: 'y1' }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            scales: {
                                y: { beginAtZero: true, title: { display: true, text: '订单数' } },
                                y1: { position: 'right', beginAtZero: true, max: 100, title: { display: true,
                                        text: '成功率(%)' } }
                            }
                        }
                    });
                }
                let channelAvgMap = new Map();
                orders.forEach(o => { if (!channelAvgMap.has(o.channel)) channelAvgMap.set(o.channel, { sum: 0,
                        cnt: 0 }); let c = channelAvgMap.get(o.channel);
                    c.sum += o.amount;
                    c.cnt++; });
                let channelAvgHtml = "";
                for (let [ch, data] of channelAvgMap.entries()) { channelAvgHtml +=
                        `<p>${escapeHtml(ch)}: ¥${(data.sum / data.cnt).toFixed(1)}</p>`; }
                let topCityAmount = Array.from(cityAmountMap.entries()).map(([city, data]) => ({ city, avg: data.sum /
                        data.cnt, orders: data.cnt })).sort((a, b) => b.avg - a.avg).slice(0, 3);
                let cityAvgHtml = topCityAmount.length ? topCityAmount.map(c =>
                    `<p>${escapeHtml(c.city)}: ¥${c.avg.toFixed(1)} (${c.orders}单)</p>`).join('') : "<p>暂无</p>";
                const avgCompleteFilter = completed > 0 ? (completedAmount / completed).toFixed(1) : 0;
                const avgCancelFilter = cancelled > 0 ? (cancelledAmount / cancelled).toFixed(1) : 0;
                document.getElementById("amountAnalysis").innerHTML =
                    `<div class="amount-card"><h4>📊 渠道平均订单额</h4>${channelAvgHtml}</div><div class="amount-card"><h4>✅ 完成 vs 取消 平均额</h4><p>完成订单: ¥${avgCompleteFilter}</p><p>取消订单: ¥${avgCancelFilter}</p><p>${avgCancelFilter < avgCompleteFilter ? "取消订单金额通常较低（可能因缺货、用户取消等原因）" : "取消订单金额偏高（需关注大额订单取消原因）"}</p></div><div class="amount-card"><h4>🏙️ 城市客单价TOP3</h4>${cityAvgHtml}</div>`;
                let peakHour = hourTotal.indexOf(Math.max(...hourTotal));
                document.getElementById("insightText").innerHTML =
                    `<i class="fas fa-chart-simple"></i> <strong>核心洞察（${currentSelectedProvince}）</strong><br>• 当前筛选范围内订单总数：${totalOrders} 单，总金额 ¥${totalAmount.toFixed(0)}<br>• 完成率 ${completionPercent}%，核销成功 ${verifySuccess} 笔<br>• 平均配送距离 ${avgDistOverall} km<br>• 订单高峰时段：${peakHour}:00，核销成功率低谷时段需关注`;
                renderStoreRankingWithPagination();
            }
